# This is a workflow name
name: Hello Workflow

on:
  push:
    branches:
      - main
# These are jobs inside workflow
jobs:
# This is the name of the job
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Print Message
        run: echo "Hello from GitHub Actions!"
      - name: Intentional Failure
        run: exit 1
