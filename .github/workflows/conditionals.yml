name: conditional-failed-main-demo
on:
 push:
  branches: [main]

jobs:
  when_main:
    runs-on: ubuntu-latest
    steps:
      - name: runs when the branch is main
        if: github.ref == 'refs/heads/main'
        run: |
          echo "runs when the branch is main"
          # exit 1

      - name: only runs when the previous step failed
        if: failure()
        run: echo "Previous step failed....."

